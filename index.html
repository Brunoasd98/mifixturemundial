<head>

<style>
:root{
  --gold:#FFD700;--gold2:#FFA500;--dark:#0a0a0f;--dark2:#111118;--dark3:#1a1a24;
  --dark4:#22222e;--card:#18181f;--border:#2a2a38;--text:#e8e8f0;--muted:#8888a0;
  --red:#e63946;--green:#2dc653;--blue:#3a86ff;--accent:#ff6b35;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
header{background:linear-gradient(135deg,var(--dark2),#0d0d1a);position:sticky;top:0;z-index:200;padding:0 20px;}
.header-content{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;flex-wrap:wrap;gap:10px;}
.logo{font-family:'Bebas Neue';font-size:1.5rem;color:var(--gold);letter-spacing:2px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.logo span{color:var(--text);}
.botones-accion{display:flex;gap:8px;}
.simular-btn,.reset-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);border:none;border-radius:20px;padding:5px 12px;font-family:'Barlow Condensed';font-weight:800;font-size:.7rem;cursor:pointer;transition:all .2s;}
.reset-btn{background:linear-gradient(135deg,var(--red),#c1121f);color:white;}
.simular-btn:hover,.reset-btn:hover{transform:scale(1.05);}
.sync-status{font-size:.7rem;background:rgba(0,0,0,.5);padding:4px 10px;border-radius:20px;color:var(--muted);}
.sync-status.synced{color:var(--green);}
.sync-status.syncing{color:var(--gold);}
.tabs-principales{display:flex;gap:4px;background:rgba(0,0,0,.3);padding:4px;border-radius:12px;}
.tab-principal{background:none;border:none;color:var(--muted);font-family:'Barlow Condensed';font-size:.85rem;font-weight:700;padding:8px 20px;border-radius:8px;cursor:pointer;transition:all .2s;}
.tab-principal.active,.tab-principal:hover{background:rgba(255,215,0,.15);color:var(--gold);}
.container{max-width:1400px;margin:0 auto;padding:20px;}
.contenido-principal{display:none;}
.contenido-principal.active{display:block;}
.tabs-grupos{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;background:var(--dark3);padding:8px 12px;border-radius:12px;}
.tab-grupo{background:none;border:none;color:var(--muted);font-family:'Barlow Condensed';font-size:.75rem;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .2s;}
.tab-grupo.active,.tab-grupo:hover{background:rgba(255,215,0,.15);color:var(--gold);}
.contenido-grupo{display:none;}
.contenido-grupo.active{display:block;}
.partidos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:25px;}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;transition:all .2s;}
.match-card:hover{border-color:var(--gold);}
.match-header{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.7rem;color:var(--muted);}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:8px;}
.team{display:flex;align-items:center;gap:8px;font-weight:600;font-size:.85rem;transition:all .2s;}
.team.right{flex-direction:row-reverse;text-align:right;}
.team.ganador{background:rgba(45,198,83,.2);padding:6px 10px;border-radius:8px;margin:-6px -10px;}
.team.perdedor{background:rgba(230,57,70,.15);padding:6px 10px;border-radius:8px;margin:-6px -10px;}
.flag{width:28px;height:20px;border-radius:3px;object-fit:cover;border:1px solid var(--border);}
.score{font-family:'Bebas Neue';font-size:1.5rem;color:var(--gold);letter-spacing:2px;}
.vs{font-size:.9rem;color:var(--muted);font-weight:700;}
.match-estadio{font-size:.65rem;color:var(--muted);text-align:center;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.result-input{display:flex;justify-content:center;gap:8px;margin-top:10px;}
.result-input input{width:50px;height:36px;background:var(--dark);border:2px solid var(--border);border-radius:8px;color:var(--gold);font-family:'Bebas Neue';font-size:1.3rem;text-align:center;}
.result-input button{background:var(--gold);color:var(--dark);border:none;border-radius:6px;padding:5px 12px;font-weight:700;cursor:pointer;}
.edit-btn{background:var(--dark4);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.7rem;}
.group-table{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow-x:auto;margin-top:10px;}
.group-table table{width:100%;border-collapse:collapse;}
.group-table th,.group-table td{padding:10px 6px;text-align:center;font-size:.75rem;}
.group-table th:first-child,.group-table td:first-child{text-align:left;padding-left:12px;}
.group-table th{background:rgba(0,0,0,.3);color:var(--muted);}
.group-table tr{border-bottom:1px solid var(--border);cursor:pointer;}
.group-table tr:hover{background:rgba(255,215,0,.05);}
.group-table tr.qualified{background:rgba(45,198,83,.1);}
.group-table tr.third-qualified{background:rgba(255,215,0,.15);}
.calendario-partidos{display:flex;flex-direction:column;gap:20px;}
.dia-partidos{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.dia-header{background:linear-gradient(90deg,var(--gold),transparent);padding:12px 20px;color:var(--dark);font-weight:800;font-size:1.1rem;display:flex;justify-content:space-between;align-items:center;}
.dia-fecha{color:var(--dark);margin-left:10px;font-size:.9rem;}
.dia-partidos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;padding:15px;}
.partido-calendario{background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:10px;transition:all .2s;}
.partido-calendario:hover{border-color:var(--gold);}
.partido-calendario .match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.partido-calendario .match-info{font-size:.65rem;color:var(--muted);text-align:center;margin-top:8px;padding-top:6px;border-top:1px solid var(--border);}
.partido-calendario .score{font-size:1.2rem;}
.eliminatorias-container{display:flex;flex-direction:column;gap:30px;}
.ronda-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.ronda-title{background:linear-gradient(90deg,var(--gold),transparent);padding:12px 20px;color:var(--dark);font-weight:800;font-size:1.2rem;}
.ronda-partidos{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;padding:20px;}
.partido-card{background:var(--dark3);border:1px solid var(--border);border-radius:12px;width:340px;overflow:hidden;}
.partido-header{background:var(--dark4);padding:8px;text-align:center;font-size:.7rem;color:var(--muted);border-bottom:1px solid var(--border);}
.partido-equipos{padding:12px;}
.equipo-linea{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.equipo-linea:last-child{border-bottom:none;}
.equipo-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:.8rem;}
.equipo-pos{font-size:.65rem;color:var(--muted);background:rgba(0,0,0,.4);padding:2px 5px;border-radius:4px;margin-left:5px;}
.equipo-score{font-weight:700;color:var(--gold);font-size:1rem;}
.equipo-linea.ganador{background:rgba(45,198,83,.2);margin:0 -8px;padding:8px 8px;border-radius:8px;}
.equipo-linea.perdedor{background:rgba(230,57,70,.15);margin:0 -8px;padding:8px 8px;border-radius:8px;}
.btn-seleccionar{background:var(--gold);color:var(--dark);border:none;border-radius:6px;padding:6px 12px;font-size:.7rem;font-weight:700;cursor:pointer;margin-top:8px;width:100%;}
.btn-seleccionar:hover{background:var(--gold2);}
.penal-area{margin-top:10px;padding:8px;background:rgba(0,0,0,.3);border-radius:8px;}
.penal-titulo{font-size:.6rem;text-align:center;color:var(--muted);margin-bottom:5px;}
.penal-circles{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;}
.penal-circle{width:26px;height:26px;border-radius:50%;background:var(--dark);border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;transition:all .2s;}
.penal-circle.verde{background:var(--green);border-color:var(--green);color:white;}
.penal-circle.rojo{background:var(--red);border-color:var(--red);color:white;}
.penal-circle:hover{transform:scale(1.1);}
.input-resultado{display:flex;justify-content:center;gap:6px;margin-top:10px;}
.input-resultado input{width:45px;height:32px;background:var(--dark);border:2px solid var(--border);border-radius:6px;color:var(--gold);text-align:center;font-size:1rem;}
.input-resultado button{background:var(--gold);color:var(--dark);border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-weight:700;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:1000;justify-content:center;align-items:center;}
.modal-content{background:var(--dark2);border:2px solid var(--gold);border-radius:20px;max-width:450px;width:90%;}
.modal-header{padding:15px 20px;background:var(--dark3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;}
.modal-body{padding:20px;max-height:400px;overflow-y:auto;}
.tercero-item{display:flex;align-items:center;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s;}
.tercero-item:hover{background:rgba(255,215,0,.1);}
.tercero-item button{background:var(--gold);color:var(--dark);border:none;border-radius:6px;padding:5px 12px;cursor:pointer;}
.modal-footer{margin-top:15px;text-align:center;padding-top:10px;border-top:1px solid var(--border);}
.btn-cerrar-modal{background:var(--dark4);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px 15px;cursor:pointer;}
.squad-player{display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid var(--border);}
.squad-pos{padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:700;}
.pos-POR{background:rgba(245,200,66,.2);color:#f5c842;}
.pos-DEF{background:rgba(58,134,255,.2);color:#3a86ff;}
.pos-MED{background:rgba(45,198,83,.2);color:#2dc653;}
.pos-DEL{background:rgba(230,57,70,.2);color:#e63946;}
.squad-num{width:35px;font-weight:700;color:var(--gold);}
.squad-name{flex:1;}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:none;}
@media(max-width:768px){
  .partidos-grid{grid-template-columns:1fr;}
  .ronda-partidos{flex-direction:column;align-items:center;}
  .partido-card{width:100%;}
  .dia-partidos-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<header>
  <div class="header-content">
    <div class="logo">MUNDIAL <span>2026</span>
      <div class="botones-accion">

<div id="selectorModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>⚽ SELECCIONAR 3° LUGAR</h3><button class="modal-close" onclick="cerrarSelector()">✕</button></div><div id="selectorBody" class="modal-body"></div><div class="modal-footer"><button class="btn-cerrar-modal" onclick="cerrarSelector()">Cerrar</button></div></div></div>
<div id="modalPlantel" class="modal"><div class="modal-content"><div class="modal-header"><h3>📋 PLANTEL</h3><button class="modal-close" onclick="cerrarModalPlantel()">✕</button></div><div class="modal-body" id="modalPlantelBody"></div><div class="modal-footer"><button class="btn-cerrar-modal" onclick="cerrarModalPlantel()">Cerrar</button></div></div></div>

<script>
// ==================== CONFIGURACIÓN DE FIREBASE ====================
// ⚠️ IMPORTANTE: REEMPLAZA ESTOS DATOS CON LOS DE TU PROYECTO EN FIREBASE ⚠️
// Puedes obtenerlos desde: https://console.firebase.google.com/
// Ve a Configuración del proyecto -> Tus aplicaciones -> Configuración del SDK
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  databaseURL: "TU_DATABASE_URL",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE_BUCKET",
  messagingSenderId: "TU_MESSAGING_SENDER_ID",
  appId: "TU_APP_ID"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Referencias en la base de datos
const resultadosRef = database.ref('mundial2026/resultados');
const penalesRef = database.ref('mundial2026/penales');
const tercerosRef = database.ref('mundial2026/terceros');

// Estado de sincronización
let isLoadingFromFirebase = false;
let isSavingToFirebase = false;

// Función para actualizar estado de sincronización
function updateSyncStatus(status, isError = false) {
  const syncDiv = document.getElementById('syncStatus');
  if (isError) {
    syncDiv.innerHTML = '⚠️ Error de sincronización';
    syncDiv.style.color = 'var(--red)';
  } else if (status === 'synced') {
    syncDiv.innerHTML = '✅ Sincronizado';
    syncDiv.style.color = 'var(--green)';
  } else if (status === 'syncing') {
    syncDiv.innerHTML = '🔄 Sincronizando...';
    syncDiv.style.color = 'var(--gold)';
  } else if (status === 'connected') {
    syncDiv.innerHTML = '☁️ Conectado a la nube';
    syncDiv.style.color = 'var(--green)';
  } else if (status === 'disconnected') {
    syncDiv.innerHTML = '📡 Sin conexión - modo local';
    syncDiv.style.color = 'var(--red)';
  }
}

// Escuchar cambios en tiempo real desde Firebase
function setupFirebaseListeners() {
  // Escuchar cambios en resultados
  resultadosRef.on('value', (snapshot) => {
    if (isSavingToFirebase) return;
    isLoadingFromFirebase = true;
    const data = snapshot.val();
    if (data) {
      window.RESULTADOS = data;
    } else {
      window.RESULTADOS = {};
    }
    guardarTodoLocal();
    refreshAllViews();
    isLoadingFromFirebase = false;
  }, (error) => {
    console.error('Error al cargar resultados:', error);
    updateSyncStatus('disconnected', true);
  });

  // Escuchar cambios en penales
  penalesRef.on('value', (snapshot) => {
    if (isSavingToFirebase) return;
    isLoadingFromFirebase = true;
    const data = snapshot.val();
    if (data) {
      window.PENALES = data;
    } else {
      window.PENALES = {};
    }
    guardarTodoLocal();
    refreshAllViews();
    isLoadingFromFirebase = false;
  }, (error) => {
    console.error('Error al cargar penales:', error);
  });

  // Escuchar cambios en terceros
  tercerosRef.on('value', (snapshot) => {
    if (isSavingToFirebase) return;
    isLoadingFromFirebase = true;
    const data = snapshot.val();
    if (data) {
      window.ASIGNACIONES_TERCEROS = data;
    } else {
      window.ASIGNACIONES_TERCEROS = {};
    }
    guardarTodoLocal();
    refreshAllViews();
    isLoadingFromFirebase = false;
  }, (error) => {
    console.error('Error al cargar terceros:', error);
  });

  // Monitorear estado de conexión
  database.ref('.info/connected').on('value', (snap) => {
    if (snap.val() === true) {
      updateSyncStatus('connected');
    } else {
      updateSyncStatus('disconnected');
    }
  });
}

// Guardar datos en Firebase
async function syncToFirebase() {
  if (isLoadingFromFirebase) return;
  isSavingToFirebase = true;
  updateSyncStatus('syncing');
  
  try {
    await Promise.all([
      resultadosRef.set(window.RESULTADOS || {}),
      penalesRef.set(window.PENALES || {}),
      tercerosRef.set(window.ASIGNACIONES_TERCEROS || {})
    ]);
    updateSyncStatus('synced');
  } catch (error) {
    console.error('Error al sincronizar con Firebase:', error);
    updateSyncStatus('disconnected', true);
  } finally {
    isSavingToFirebase = false;
  }
}

// Guardar en localStorage (copia local)
function guardarTodoLocal() {
  localStorage.setItem('mundial2026_res', JSON.stringify(window.RESULTADOS || {}));
  localStorage.setItem('mundial2026_penales', JSON.stringify(window.PENALES || {}));
  localStorage.setItem('mundial2026_terceros', JSON.stringify(window.ASIGNACIONES_TERCEROS || {}));
}

// Guardar todo y sincronizar con Firebase
function guardarTodo() {
  guardarTodoLocal();
  syncToFirebase();
}

// Recargar todas las vistas
function refreshAllViews() {
  renderTodosLosGrupos();
  renderEliminatorias();
  renderCalendario();
}

// Cargar datos iniciales (de Firebase o localStorage como fallback)
async function loadInitialData() {
  try {
    // Intentar cargar desde Firebase primero
    const [resultadosSnap, penalesSnap, tercerosSnap] = await Promise.all([
      resultadosRef.once('value'),
      penalesRef.once('value'),
      tercerosRef.once('value')
    ]);
    
    window.RESULTADOS = resultadosSnap.val() || {};
    window.PENALES = penalesSnap.val() || {};
    window.ASIGNACIONES_TERCEROS = tercerosSnap.val() || {};
    
    // Si Firebase no tiene datos, intentar cargar desde localStorage
    if (Object.keys(window.RESULTADOS).length === 0) {
      const localRes = localStorage.getItem('mundial2026_res');
      if (localRes) window.RESULTADOS = JSON.parse(localRes);
    }
    if (Object.keys(window.PENALES).length === 0) {
      const localPen = localStorage.getItem('mundial2026_penales');
      if (localPen) window.PENALES = JSON.parse(localPen);
    }
    if (Object.keys(window.ASIGNACIONES_TERCEROS).length === 0) {
      const localTer = localStorage.getItem('mundial2026_terceros');
      if (localTer) window.ASIGNACIONES_TERCEROS = JSON.parse(localTer);
    }
    
    // Sincronizar datos locales a Firebase si no existían
    if (Object.keys(window.RESULTADOS).length > 0 && (!resultadosSnap.val() || Object.keys(resultadosSnap.val()).length === 0)) {
      await syncToFirebase();
    }
  } catch (error) {
    console.error('Error al cargar datos iniciales:', error);
    // Fallback a localStorage
    window.RESULTADOS = JSON.parse(localStorage.getItem('mundial2026_res') || '{}');
    window.PENALES = JSON.parse(localStorage.getItem('mundial2026_penales') || '{}');
    window.ASIGNACIONES_TERCEROS = JSON.parse(localStorage.getItem('mundial2026_terceros') || '{}');
    updateSyncStatus('disconnected', true);
  }
  
  guardarTodoLocal();
  refreshAllViews();
}

// ==================== BANDERAS ====================
const FC = {
  'México':'mx','Sudáfrica':'za','Corea del Sur':'kr','Rep. Checa':'cz','Canadá':'ca',
  'Bosnia y Herzegovina':'ba','Qatar':'qa','Suiza':'ch','Brasil':'br','Marruecos':'ma',
  'Haití':'ht','Escocia':'gb-sct','Estados Unidos':'us','Paraguay':'py','Australia':'au',
  'Turquía':'tr','Alemania':'de','Costa de Marfil':'ci','Ecuador':'ec','Curazao':'cw',

// ==================== CONFETTI ====================
function lanzarConfettiDelLado(ganadorEsLocal){
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const W = canvas.width, H = canvas.height;
  const ladoX = ganadorEsLocal ? W * 0.25 : W * 0.75;
  const colores = ['#FFD700', '#FF6B35', '#2DC653', '#3A86FF', '#FF006E', '#FFBE0B'];
  const particulas = Array.from({length: 150}, () => ({
    x: ladoX + (Math.random() - 0.5) * 100,
    y: H * 0.7,
    vx: (Math.random() - 0.5) * 12,
    vy: -(Math.random() * 12 + 5),
    r: Math.random() * 5 + 2,
    color: colores[Math.floor(Math.random() * colores.length)],
    tipo: Math.random() > 0.4 ? 'circulo' : 'rectangulo',
    rot: Math.random() * 360,
    rv: (Math.random() - 0.5) * 10,
    gravedad: 0.2 + Math.random() * 0.1,
    alpha: 1
  }));
  let frame = 0;
  function animar(){
    ctx.clearRect(0, 0, W, H);
    let todasMuertas = true;
    particulas.forEach(p => {
      if(p.alpha > 0){
        todasMuertas = false;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        if(p.tipo === 'circulo'){
          ctx.beginPath();
          ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.r, -p.r/2, p.r * 2, p.r);
        }
        ctx.restore();
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravedad;
        p.rot += p.rv;
        if(frame > 70) p.alpha -= 0.015;
      }
    });
    frame++;
    if(!todasMuertas && frame < 180){
      requestAnimationFrame(animar);
    } else {
      canvas.style.display = 'none';
    }
  }
  animar();
}

// ==================== ESTADÍSTICAS ====================
function getStats(equipo,grupo){
  let pj=0,g=0,e=0,p=0,gf=0,gc=0;
  PARTIDOS_POR_GRUPO[grupo].forEach(m=>{
    if(m.local===equipo || m.visitante===equipo){
      const r = window.RESULTADOS[m.id];
      if(!r) return;
      pj++;
      const gEq = m.local===equipo ? r.gl : r.gv;
      const gRv = m.local===equipo ? r.gv : r.gl;
      gf += gEq; gc += gRv;
      if(gEq > gRv) g++;
      else if(gEq === gRv) e++;
      else p++;
    }
  });
  const dif = gf-gc;
  return {pj, g, e, p, gf, gc, gd: dif, pts: (g*3 + e)};
}

  for(let g of gruposLista){
    for(let p of PARTIDOS_POR_GRUPO[g]){
      if(!window.RESULTADOS[p.id]) return false;
    }
  }
  return true;
}

function getTablaGrupo(grupo){
  const equipos = GRUPOS[grupo];
  const stats = equipos.map(eq => ({eq, ...getStats(eq,grupo)}));
  stats.sort((a,b) => {
    if(b.pts !== a.pts) return b.pts - a.pts;
    if(b.gd !== a.gd) return b.gd - a.gd;
    return b.gf - a.gf;
  });
  return stats;
}

function getMejoresTerceros(){
  if(!faseGruposCompleta()) return [];
  const todosTerceros = [];
  for(let g of gruposLista){
    const tabla = getTablaGrupo(g);
    if(tabla[2]){
      todosTerceros.push({
        grupo: g,
        equipo: tabla[2].eq,
        pts: tabla[2].pts,
        gd: tabla[2].gd,
        gf: tabla[2].gf
      });
    }
  }
  todosTerceros.sort((a,b) => {
    if(b.pts !== a.pts) return b.pts - a.pts;
    if(b.gd !== a.gd) return b.gd - a.gd;
    return b.gf - a.gf;
  });
  return todosTerceros.slice(0,8);
}

function getPrimero(grupo){
  const tabla = getTablaGrupo(grupo);
  return tabla[0]?.eq || null;
}

function getSegundo(grupo){
  const tabla = getTablaGrupo(grupo);
  return tabla[1]?.eq || null;
}

function getGanadorPartido(partido){
  const res = window.RESULTADOS[partido.id];
  if(!res) return null;
  if(res.gl > res.gv) return partido.local.equipo;
  if(res.gv > res.gl) return partido.visitante.equipo;
  let penalesLocal = 0, penalesVisitante = 0;
  for(let i=1;i<=5;i++){
    if(window.PENALES[`${partido.id}_${partido.local.equipo}_${i}`] === 'verde') penalesLocal++;
    if(window.PENALES[`${partido.id}_${partido.visitante.equipo}_${i}`] === 'verde') penalesVisitante++;
  }
  if(penalesLocal > penalesVisitante) return partido.local.equipo;
  if(penalesVisitante > penalesLocal) return partido.visitante.equipo;
  return null;
}

// ==================== RENDER CALENDARIO ====================
function renderCalendario(){
  const todosPartidos = [];
  for(let g of gruposLista){
    for(let p of PARTIDOS_POR_GRUPO[g]){
      todosPartidos.push({
        id: p.id,
        fechaISO: p.fechaISO,
        fecha: p.fecha,
        hora: p.hora,
        local: p.local,
        visitante: p.visitante,
        estadio: p.estadio,
        grupo: g,
        esEliminatoria: false,
        resultado: window.RESULTADOS[p.id]
      });
    }
  }
  for(let e of ELIMINATORIOS_CALENDARIO){
    todosPartidos.push({
      id: null,
      fechaISO: null,
      fecha: e.fecha,
      hora: e.hour || '',
      local: e.nombre,
      visitante: '',
      estadio: e.estadio,
      grupo: null,
      esEliminatoria: true,
      resultado: null
    });
  }
  const hoy = new Date().toISOString().slice(0,10);
  const partidosFuturos = todosPartidos.filter(p => !p.esEliminatoria ? (p.fechaISO >= hoy && !p.resultado) : true);
  partidosFuturos.sort((a,b) => {
    if(a.esEliminatoria && !b.esEliminatoria) return 1;
    if(!a.esEliminatoria && b.esEliminatoria) return -1;
    if(!a.esEliminatoria && !b.esEliminatoria){
      if(a.fechaISO !== b.fechaISO) return a.fechaISO.localeCompare(b.fechaISO);
      return parseInt(a.hora) - parseInt(b.hora);
    }
    const ordenFechas = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const getDia = (f) => f.split(' ')[0];
    return ordenFechas.indexOf(getDia(a.fecha)) - ordenFechas.indexOf(getDia(b.fecha));
  });
  const agrupados = {};
  partidosFuturos.forEach(p => {
    let key = p.esEliminatoria ? p.fecha : p.fechaISO;
    if(!agrupados[key]) agrupados[key] = [];
    agrupados[key].push(p);
  });
  let html = `<div class="calendario-partidos">`;
  for(let key of Object.keys(agrupados)){
    const partidos = agrupados[key];
    const titulo = partidos[0].esEliminatoria ? partidos[0].fecha : partidos[0].fecha;
    html += `<div class="dia-partidos"><div class="dia-header">📅 ${titulo}<span class="dia-fecha">${partidos.length} partido${partidos.length !== 1 ? 's' : ''}</span></div><div class="dia-partidos-grid">`;
    for(let p of partidos){
      if(p.esEliminatoria){
        html += `<div class="partido-calendario"><div class="match-teams"><div class="team">${p.local}</div><div class="score"><span class="vs">🏆</span></div><div class="team right">Fase Final</div></div><div class="match-info"><span>🏟️ ${p.estadio}</span></div></div>`;
      } else {
        html += `<div class="partido-calendario"><div class="match-teams"><div class="team">${flagImg(p.local)}<span>${p.local}</span></div><div class="score"><span class="vs">VS</span></div><div class="team right"><span>${p.visitante}</span>${flagImg(p.visitante)}</div></div><div class="match-info"><span>⏰ ${p.hora}</span><span>🏟️ ${p.estadio}</span><span>📌 Grupo ${p.grupo}</span></div></div>`;
      }
    }
    html += `</div></div>`;
  }
  if(Object.keys(agrupados).length === 0) html = `<div style="text-align:center;padding:40px;background:var(--card);border-radius:16px;"><p style="color:var(--gold);font-size:1.2rem;">🏆 ¡FELICITACIONES!</p><p style="color:var(--muted);">Se han completado todos los partidos.</p></div>`;
  html += `</div>`;
  document.getElementById('calendario-content').innerHTML = html;
}

// ==================== RENDER GRUPOS ====================
function renderGrupo(grupo){
  const partidos = PARTIDOS_POR_GRUPO[grupo];
  let partidosHtml = `<div class="partidos-grid">`;
  for(let p of partidos){
    const res = window.RESULTADOS[p.id];
    let localClass = '', visitanteClass = '';
    if(res){
      if(res.gl > res.gv) localClass = 'ganador';
      else if(res.gv > res.gl) visitanteClass = 'ganador';
      else { localClass = 'ganador'; visitanteClass = 'ganador'; }
      if(res.gl < res.gv) localClass = 'perdedor';
      if(res.gv < res.gl) visitanteClass = 'perdedor';
    }
    partidosHtml += `<div class="match-card"><div class="match-header"><span>${p.fecha}</span><span>⏰ ${p.hora}</span></div><div class="match-teams"><div class="team ${localClass}">${flagImg(p.local)}<span>${p.local}</span></div><div class="score">${res ? `${res.gl} — ${res.gv}` : '<span class="vs">VS</span>'}</div><div class="team right ${visitanteClass}"><span>${p.visitante}</span>${flagImg(p.visitante)}</div></div><div class="match-estadio">🏟️ ${p.estadio}</div>`;
    if(!res){
      partidosHtml += `<div class="result-input"><input type="number" id="gl-${p.id}" placeholder="0"><span>—</span><input type="number" id="gv-${p.id}" placeholder="0"><button onclick="guardarResultadoGrupo(${p.id},'${grupo}')">Guardar</button></div>`;
    } else {
      partidosHtml += `<div class="result-input"><span style="color:var(--muted);">✅ ${res.gl} - ${res.gv}</span><button class="edit-btn" onclick="editarResultadoGrupo(${p.id},'${grupo}')">Editar</button></div>`;
    }
    partidosHtml += `</div>`;
  }
  partidosHtml += `</div>`;
  
  const tabla = getTablaGrupo(grupo);
  const mejoresTerceros = getMejoresTerceros();
  const esTerceroClasificado = (eq) => mejoresTerceros.some(t => t.equipo === eq);
  const gruposCompletos = faseGruposCompleta();
  
  let tablaHtml = `<div class="group-table"><table><thead><tr><th>Selección</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th></tr></thead><tbody>`;
  for(let i=0;i<tabla.length;i++){
    const s = tabla[i];
    let clase = '';
    let textoAdicional = '';
    if(i===0 || i===1){
      clase = 'qualified';
      textoAdicional = ' ✅';
    } else if(i===2){
      if(!gruposCompletos) textoAdicional = ' ⏳';
      else if(esTerceroClasificado(s.eq)){
        clase = 'third-qualified';
        textoAdicional = ' ✅ 3°';
      } else textoAdicional = ' ❌';
    }
    const gdTexto = s.gd > 0 ? `+${s.gd}` : `${s.gd}`;
    tablaHtml += `<tr class="${clase}" onclick="verPlantel('${s.eq}')"><td><div style="display:flex;align-items:center;gap:6px">${flagImg(s.eq,24,18)}<span>${s.eq}</span>${textoAdicional}</div></td>
      <td>${s.pj}</td><td style="color:var(--green)">${s.g}</td><td style="color:var(--muted)">${s.e}</td><td style="color:var(--red)">${s.p}</td>
      <td>${s.gf}</td><td style="color:var(--muted)">${s.gc}</td><td style="color:var(--muted)">${gdTexto}</td><td style="color:var(--gold);font-weight:700">${s.pts}</td></tr>`;
  }
  tablaHtml += `</tbody></table></div>`;
  document.getElementById(`grupo-${grupo}`).innerHTML = partidosHtml + tablaHtml;
}

function guardarResultadoGrupo(id, grupo){
  const gl = document.getElementById(`gl-${id}`)?.value;
  const gv = document.getElementById(`gv-${id}`)?.value;
  if(!gl || !gv || gl==='' || gv===''){alert('Ingresa ambos goles'); return;}
  const golesLocal = parseInt(gl), golesVisitante = parseInt(gv);
  window.RESULTADOS[id] = {gl: golesLocal, gv: golesVisitante};
  guardarTodo();
  renderGrupo(grupo);
  renderEliminatorias();
  renderCalendario();
  lanzarConfettiDelLado(golesLocal > golesVisitante);
}

function editarResultadoGrupo(id, grupo){
  delete window.RESULTADOS[id];
  guardarTodo();
  renderGrupo(grupo);
  renderEliminatorias();
  renderCalendario();
}

  if(p.requiereTercero && !window.ASIGNACIONES_TERCEROS[p.id]) html += `<button class="btn-seleccionar" onclick="abrirSelectorTerceros('${p.id}')">⚡ SELECCIONAR 3° LUGAR</button>`;

          html += `<div><div style="font-size:.7rem;text-align:center">${flagImg(eq,20,15)} ${eq}</div><div class="penal-circles">`;

  // Cuartos según resultados de OCTAVOS

        }
        ganadoresOct[p.id] = penLocal > penVisit ? p.l : p.v;
      }

  }
  
  const cuartos = [
    {id:'cuar_97',f:'Jueves 9/7',l:ganadoresOct['oct_89'], v:ganadoresOct['oct_90'], e:'Estadio Boston'},

    {id:'cuar_100',f:'Sábado 11/7',l:ganadoresOct['oct_95'], v:ganadoresOct['oct_96'], e:'Estadio Kansas City'}
  ];
  
  // Semis según resultados de CUARTOS
  const ganadoresCuar = {};
  for(let p of cuartos){
    const res = window.RESULTADOS[p.id];
    if(res){
      if(res.gl > res.gv) ganadoresCuar[p.id] = p.l;
      else if(res.gv > res.gl) ganadoresCuar[p.id] = p.v;
      else {
        let penLocal=0, penVisit=0;
        for(let i=1;i<=5;i++){
          if(window.PENALES[`${p.id}_${p.l}_${i}`] === 'verde') penLocal++;
          if(window.PENALES[`${p.id}_${p.v}_${i}`] === 'verde') penVisit++;
        }
        ganadoresCuar[p.id] = penLocal > penVisit ? p.l : p.v;
      }
    }
  }
  
  const semis = [
    {id:'sem_101',f:'Martes 14/7',l:ganadoresCuar['cuar_97'], v:ganadoresCuar['cuar_98'], e:'Estadio Dallas'},
    {id:'sem_102',f:'Miércoles 15/7',l:ganadoresCuar['cuar_99'], v:ganadoresCuar['cuar_100'], e:'Estadio Atlanta'}
  ];
  
  // Final según resultados de SEMIS
  const ganadoresSem = {};
  for(let p of semis){
    const res = window.RESULTADOS[p.id];
    if(res){
      if(res.gl > res.gv) ganadoresSem[p.id] = p.l;
      else if(res.gv > res.gl) ganadoresSem[p.id] = p.v;
      else {
        let penLocal=0, penVisit=0;
        for(let i=1;i<=5;i++){
          if(window.PENALES[`${p.id}_${p.l}_${i}`] === 'verde') penLocal++;
          if(window.PENALES[`${p.id}_${p.v}_${i}`] === 'verde') penVisit++;
        }
        ganadoresSem[p.id] = penLocal > penVisit ? p.l : p.v;

  const final = {id:'final_104',f:'Domingo 19/7',l:ganadoresSem['sem_101'], v:ganadoresSem['sem_102'], e:'Estadio Nueva York Nueva Jersey'};
  
  // Tercer puesto
  const perdedoresSem = {};
  for(let p of semis){
    if(ganadoresSem[p.id] === p.l) perdedoresSem[p.id] = p.v;
    else if(ganadoresSem[p.id] === p.v) perdedoresSem[p.id] = p.l;

  const tercerPuesto = {id:'ter_103',f:'Sábado 18/7',l:perdedoresSem['sem_101'], v:perdedoresSem['sem_102'], e:'Estadio Miami'};
  
  // Renderizar
  let html = `<div class="eliminatorias-container">`;

  html += `<div class="ronda-card"><div class="ronda-title">🏆 OCTAVOS DE FINAL</div><div class="ronda-partidos">${octavos.map(p=>renderizarPartidoSimple(p)).join('')}</div></div>`;
  html += `<div class="ronda-card"><div class="ronda-title">🏆 CUARTOS DE FINAL</div><div class="ronda-partidos">${cuartos.map(p=>renderizarPartidoSimple(p)).join('')}</div></div>`;

  html += `</div>`;
  document.getElementById('eliminatoria-content').innerHTML = html;
}

function guardarEliminatoria(id){
  const gl = document.getElementById(`gl-${id}`)?.value;
  const gv = document.getElementById(`gv-${id}`)?.value;
  if(!gl || !gv || gl==='' || gv===''){alert('Ingresa ambos goles'); return;}
  window.RESULTADOS[id] = {gl:parseInt(gl), gv:parseInt(gv)};
  guardarTodo();
  renderEliminatorias();
  renderTodosLosGrupos();
  lanzarConfettiDelLado(parseInt(gl) > parseInt(gv));
}

function editarEliminatoria(id){
  delete window.RESULTADOS[id];
  guardarTodo();
  renderEliminatorias();
  renderTodosLosGrupos();
}

function togglePenal(id, equipo, idx){
  const key = `${id}_${equipo}_${idx}`;
  if(!window.PENALES[key]) window.PENALES[key] = 'verde';
  else if(window.PENALES[key] === 'verde') window.PENALES[key] = 'rojo';
  else delete window.PENALES[key];
  guardarTodo();
  renderEliminatorias();
}

// ==================== RENDER TODOS LOS GRUPOS ====================
function renderTodosLosGrupos(){
  let tabsHtml = '', contenidoHtml = '';
  for(let g of gruposLista){
    tabsHtml += `<button class="tab-grupo" onclick="cambiarGrupo('${g}')">GRUPO ${g}</button>`;
    contenidoHtml += `<div id="grupo-${g}" class="contenido-grupo"></div>`;
  }
  document.getElementById('tabs-grupos').innerHTML = tabsHtml;
  document.getElementById('contenido-grupos').innerHTML = contenidoHtml;
  for(let g of gruposLista) renderGrupo(g);
  document.querySelector('.tab-grupo')?.classList.add('active');
  document.getElementById('grupo-A')?.classList.add('active');
}

function cambiarGrupo(grupo){
  document.querySelectorAll('.tab-grupo').forEach(btn=>btn.classList.remove('active'));
  document.querySelectorAll('.contenido-grupo').forEach(c=>c.classList.remove('active'));
  const idx = gruposLista.indexOf(grupo);
  document.querySelectorAll('.tab-grupo')[idx]?.classList.add('active');
  document.getElementById(`grupo-${grupo}`)?.classList.add('active');
}

function cambiarSeccion(seccion){
  document.querySelectorAll('.tab-principal').forEach(btn=>btn.classList.remove('active'));
  document.querySelectorAll('.contenido-principal').forEach(c=>c.classList.remove('active'));
  if(seccion==='inicio'){
    document.querySelectorAll('.tab-principal')[0].classList.add('active');
    document.getElementById('seccion-inicio').classList.add('active');
    renderCalendario();
  } else if(seccion==='grupos'){
    document.querySelectorAll('.tab-principal')[1].classList.add('active');
    document.getElementById('seccion-grupos').classList.add('active');
    renderTodosLosGrupos();
  } else {
    document.querySelectorAll('.tab-principal')[2].classList.add('active');
    document.getElementById('seccion-eliminatoria').classList.add('active');
    renderEliminatorias();
  }
}

// Inicializar la aplicación
async function init() {
  await loadInitialData();
  setupFirebaseListeners();
  renderCalendario();
  renderTodosLosGrupos();
}

init();
</script>
